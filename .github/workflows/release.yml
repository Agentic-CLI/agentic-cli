name: Release

# Cut a release by pushing a tag like `v1.2.3`. See RELEASING.md for the
# full runbook. This workflow builds the sdist + wheel and publishes a
# GitHub Release with those artifacts attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tag
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build # writes dist/*.tar.gz and dist/*.whl

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes_file="$(mktemp)"

          # Try to extract this version's section from CHANGELOG.md
          # (from its `## [X.Y.Z]` heading up to the next `## ` heading).
          if [ -f CHANGELOG.md ] && \
             awk -v ver="$version" '
               $0 ~ "^## \\[" ver "\\]" {found=1; next}
               found && /^## / {exit}
               found {print}
             ' CHANGELOG.md > "$notes_file" && [ -s "$notes_file" ]; then
            echo "Using release notes extracted from CHANGELOG.md"
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          else
            echo "No CHANGELOG section found; using auto-generated notes"
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

      # -----------------------------------------------------------------------
      # DISABLED: Publish to PyPI via Trusted Publishing (OIDC).
      #
      # Enable this once the PyPI package name is finalized/claimed (see the
      # "TODO: PyPI publishing" section in RELEASING.md). To turn it on:
      #   1. Configure a Trusted Publisher for this repo + workflow on PyPI.
      #   2. Add the `id-token: write` permission at the top of this file
      #      (alongside `contents: write`).
      #   3. Uncomment the step below. No API token/secret is needed — OIDC
      #      handles authentication.
      #
      # - name: Publish to PyPI (Trusted Publishing)
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: dist/
      # -----------------------------------------------------------------------
