name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke — CLI runs
        run: agentic --help

      - name: Smoke — gate allows normal, blocks sensitive
        run: |
          cd examples/todo-app
          agentic project
          echo '{"session_id":"ci","cwd":"'"$PWD"'","tool_name":"Edit","tool_input":{"file_path":"src/todo/api.py"}}' | agentic gate
          set +e
          echo '{"session_id":"ci","cwd":"'"$PWD"'","tool_name":"Write","tool_input":{"file_path":"src/todo/models/todo.py"}}' | agentic gate
          code=$?
          set -e
          test "$code" -eq 2 || { echo "expected block exit 2, got $code"; exit 1; }
          agentic doctor

      - name: Tests
        run: pytest
